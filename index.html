<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>记忆之神 · 记忆藏馆</title>
    <!-- Supabase client, hosted with this site so the UI still works if a CDN is blocked. -->
    <script src="supabase.js"></script>
    <style>
      :root {
        --bg: #0c1211;
        --surface: #151f1d;
        --surface-soft: #1d2a27;
        --ink: #eef8f4;
        --muted: #a9bbb4;
        --quiet: #768a82;
        --line: rgba(220, 239, 235, 0.16);
        --line-strong: rgba(220, 239, 235, 0.28);
        --accent: #8be4cf;
        --accent-hover: #aaf3df;
        --accent-soft: rgba(139, 228, 207, 0.14);
        --pine: #55c1ad;
        --sky: #162824;
        --gold: #d7ad5a;
        --shadow-sm: 0 1px 2px rgba(20, 31, 29, 0.06);
        --shadow: 0 18px 45px rgba(29, 46, 43, 0.1);
        --shadow-md: 0 28px 70px rgba(29, 46, 43, 0.16);
        --radius: 8px;
        --radius-lg: 16px;
        --transition: 0.22s ease;
        --font-serif:
          "Iowan Old Style", "Songti SC", "Noto Serif SC", STSong, serif;
        --font-sans:
          Aptos, "HarmonyOS Sans SC", "PingFang SC", "Microsoft YaHei",
          sans-serif;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        background: var(--bg);
      }

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        color: var(--ink);
        font-family: var(--font-sans);
        background:
          radial-gradient(
            circle at 18% 14%,
            rgba(139, 228, 207, 0.22),
            transparent 30%
          ),
          radial-gradient(
            circle at 82% 18%,
            rgba(215, 173, 90, 0.16),
            transparent 28%
          ),
          radial-gradient(
            circle at 55% 86%,
            rgba(239, 104, 72, 0.12),
            transparent 34%
          ),
          linear-gradient(rgba(220, 239, 235, 0.014) 1px, transparent 1px),
          linear-gradient(
            90deg,
            rgba(220, 239, 235, 0.014) 1px,
            transparent 1px
          ),
          var(--bg);
        background-size:
          auto,
          auto,
          72px 72px,
          72px 72px;
        letter-spacing: 0;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      button {
        -webkit-tap-highlight-color: transparent;
      }

      .header {
        position: sticky;
        top: 0;
        z-index: 100;
        padding: 12px 20px;
        border-bottom: 1px solid rgba(220, 239, 235, 0.12);
        background: rgba(12, 18, 17, 0.72);
        backdrop-filter: blur(18px);
      }

      .header-inner {
        max-width: 1180px;
        min-height: 52px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .brand {
        min-width: 0;
        display: inline-flex;
        align-items: center;
        gap: 12px;
        color: var(--ink);
        text-decoration: none;
      }

      .brand-icon {
        width: 42px;
        height: 42px;
        flex: 0 0 auto;
        border-radius: 12px;
        display: grid;
        place-items: center;
        color: #081210;
        background:
          linear-gradient(140deg, rgba(215, 173, 90, 0.95), transparent 52%),
          linear-gradient(320deg, var(--accent), #27685d);
        box-shadow: 0 14px 30px rgba(139, 228, 207, 0.18);
        font-family: var(--font-serif);
        font-size: 1.25rem;
        font-weight: 800;
      }

      .brand-copy {
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .brand-name {
        font-family: var(--font-serif);
        font-size: 1.2rem;
        font-weight: 800;
        line-height: 1.1;
      }

      .brand-subtitle {
        color: var(--quiet);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .photo-count {
        display: inline-flex;
        align-items: baseline;
        gap: 7px;
        padding: 8px 12px;
        border: 1px solid rgba(220, 239, 235, 0.14);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--muted);
        box-shadow: var(--shadow-sm);
        font-size: 0.78rem;
        white-space: nowrap;
      }

      .photo-count strong {
        color: #fff;
        font-size: 1rem;
      }

      .btn {
        min-height: 42px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 0 18px;
        border: 1px solid transparent;
        border-radius: 999px;
        background: var(--accent);
        color: #081210;
        box-shadow: 0 18px 38px rgba(139, 228, 207, 0.18);
        cursor: pointer;
        font-family: var(--font-sans);
        font-size: 0.9rem;
        font-weight: 800;
        line-height: 1;
        transition:
          transform var(--transition),
          box-shadow var(--transition),
          background var(--transition);
      }

      .btn:hover {
        transform: translateY(-2px);
        background: var(--accent-hover);
        box-shadow: 0 22px 48px rgba(139, 228, 207, 0.23);
      }

      .btn:active {
        transform: translateY(0);
      }

      .btn-symbol {
        width: 20px;
        height: 20px;
        display: inline-grid;
        place-items: center;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.22);
        color: #081210;
        font-size: 1rem;
        line-height: 1;
      }

      .btn-hero {
        min-height: 48px;
        padding: 0 22px;
        background: var(--accent);
        box-shadow: 0 18px 42px rgba(139, 228, 207, 0.2);
      }

      .btn-hero:hover {
        background: var(--accent-hover);
        box-shadow: 0 22px 48px rgba(139, 228, 207, 0.28);
      }

      .btn-hero .btn-symbol {
        background: rgba(255, 255, 255, 0.22);
      }

      .main-container {
        width: 100%;
        max-width: 1180px;
        margin: 0 auto;
        padding: 42px 20px 72px;
        flex: 1;
        position: relative;
      }

      .main-container::before {
        content: "";
        position: absolute;
        inset: 24px 20px auto;
        height: min(620px, calc(100vh - 150px));
        border-radius: 32px;
        background: linear-gradient(
          90deg,
          rgba(12, 18, 17, 0.1),
          rgba(12, 18, 17, 0.04) 48%,
          transparent
        );
        pointer-events: none;
      }

      .empty-state {
        position: relative;
        z-index: 1;
        min-height: min(670px, calc(100vh - 130px));
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(280px, 420px);
        align-items: center;
        gap: clamp(34px, 7vw, 86px);
      }

      .empty-copy {
        max-width: 620px;
      }

      .empty-eyebrow {
        width: fit-content;
        margin-bottom: 18px;
        padding: 7px 10px;
        border: 1px solid var(--line-strong);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--accent);
        font-size: 0.76rem;
        font-weight: 900;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .empty-title {
        max-width: 9em;
        font-family: var(--font-serif);
        font-size: clamp(2.7rem, 8vw, 5.7rem);
        font-weight: 900;
        line-height: 0.98;
        text-shadow: 0 0 34px rgba(139, 228, 207, 0.14);
      }

      .empty-desc {
        max-width: 31rem;
        margin: 22px 0 28px;
        color: var(--muted);
        font-size: clamp(1rem, 2vw, 1.18rem);
        line-height: 1.85;
        opacity: 0.96;
      }

      .empty-actions {
        display: flex;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
      }

      .empty-note {
        color: var(--quiet);
        font-size: 0.88rem;
      }

      .memory-stack {
        position: relative;
        min-height: 470px;
        display: grid;
        place-items: center;
      }

      .memory-stack::before {
        content: "";
        position: absolute;
        inset: 42px 24px;
        border: 1px solid rgba(36, 92, 83, 0.16);
        border-radius: 28px;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.12), transparent 58%),
          linear-gradient(
            180deg,
            rgba(139, 228, 207, 0.12),
            rgba(215, 173, 90, 0.08)
          );
        transform: rotate(-3deg);
        box-shadow: var(--shadow);
      }

      .memory-frame {
        position: absolute;
        width: 72%;
        max-width: 300px;
        padding: 12px;
        border: 1px solid rgba(220, 239, 235, 0.18);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(14px);
        box-shadow: var(--shadow-md);
      }

      .memory-frame::before {
        content: "";
        display: block;
        aspect-ratio: 4 / 3;
        border-radius: 5px;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.7), transparent 52%),
          linear-gradient(
            160deg,
            var(--sky) 0 37%,
            #2b4d46 37% 64%,
            var(--pine) 64% 100%
          );
      }

      .memory-frame::after {
        content: "";
        display: block;
        width: 42%;
        height: 8px;
        margin-top: 12px;
        border-radius: 999px;
        background: rgba(220, 239, 235, 0.2);
      }

      .memory-frame.one {
        z-index: 3;
        transform: translate(-28px, -24px) rotate(-6deg);
      }

      .memory-frame.two {
        z-index: 2;
        transform: translate(44px, 26px) rotate(7deg);
      }

      .memory-frame.two::before {
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.64), transparent 48%),
          linear-gradient(
            145deg,
            #142823 0 38%,
            #d7ad5a 38% 62%,
            #245c53 62% 100%
          );
      }

      .memory-pin {
        position: absolute;
        z-index: 4;
        top: 78px;
        left: 54%;
        width: 54px;
        height: 54px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: var(--accent);
        color: #fff;
        box-shadow: 0 18px 38px rgba(139, 228, 207, 0.2);
        font-family: var(--font-serif);
        font-weight: 900;
      }

      .photo-grid {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
        gap: 18px;
      }

      .archive-head {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 18px;
        margin: 10px 0 22px;
      }

      .archive-kicker {
        margin-bottom: 7px;
        color: var(--accent);
        font-size: 0.74rem;
        font-weight: 900;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .archive-title {
        font-family: var(--font-serif);
        font-size: clamp(1.8rem, 4vw, 3.2rem);
        line-height: 1.05;
      }

      .archive-desc {
        max-width: 32rem;
        color: var(--muted);
        line-height: 1.7;
        font-size: 0.95rem;
      }

      .photo-card {
        position: relative;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border: 1px solid rgba(220, 239, 235, 0.12);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(10px);
        box-shadow: var(--shadow-sm);
        cursor: pointer;
        transition:
          transform var(--transition),
          box-shadow var(--transition),
          border-color var(--transition);
      }

      .photo-card:hover {
        transform: translateY(-5px);
        border-color: rgba(139, 228, 207, 0.36);
        box-shadow: var(--shadow);
      }

      .img-container {
        width: 100%;
        aspect-ratio: 4 / 3;
        overflow: hidden;
        background:
          linear-gradient(135deg, rgba(139, 228, 207, 0.08), transparent),
          var(--surface-soft);
      }

      .img-container.is-empty {
        display: grid;
        place-items: center;
      }

      .img-container.is-empty::before {
        content: "记忆待显影";
        color: var(--quiet);
        font-size: 0.8rem;
        font-weight: 800;
        letter-spacing: 0.08em;
      }

      .img-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.45s ease;
      }

      .photo-card:hover .img-container img {
        transform: scale(1.04);
      }

      .card-info {
        min-height: 98px;
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 7px;
      }

      .card-title {
        color: var(--ink);
        font-size: 1rem;
        font-weight: 900;
        line-height: 1.35;
        display: -webkit-box;
        overflow: hidden;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }

      .card-desc {
        min-height: 1.35em;
        color: var(--muted);
        font-size: 0.82rem;
        line-height: 1.45;
        display: -webkit-box;
        overflow: hidden;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }

      .card-date {
        margin-top: auto;
        color: var(--quiet);
        font-size: 0.74rem;
      }

      .lightbox-overlay {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        background: rgba(9, 13, 12, 0.88);
        backdrop-filter: blur(14px);
        transition: opacity 0.28s ease;
      }

      .lightbox-overlay.active {
        opacity: 1;
        pointer-events: all;
      }

      .lightbox-content {
        width: min(92vw, 1080px);
        max-height: 90vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: var(--radius-lg);
        background: #0d1110;
        box-shadow: 0 36px 90px rgba(0, 0, 0, 0.42);
        transform: translateY(12px) scale(0.98);
        transition: transform 0.28s ease;
      }

      .active .lightbox-content {
        transform: none;
      }

      .lightbox-img-wrap {
        min-height: 220px;
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0b0d0c;
      }

      .lightbox-img-wrap img {
        max-width: 100%;
        max-height: 72vh;
        object-fit: contain;
      }

      .lightbox-info {
        padding: 18px 22px;
        border-top: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(13, 17, 16, 0.96);
      }

      .lightbox-close,
      .lightbox-nav {
        position: absolute;
        z-index: 10;
        width: 42px;
        height: 42px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.12);
        color: #fff;
        cursor: pointer;
        transition:
          background var(--transition),
          transform var(--transition);
      }

      .lightbox-close {
        top: 18px;
        right: 18px;
        font-size: 1.2rem;
      }

      .lightbox-nav {
        top: 50%;
        transform: translateY(-50%);
        font-size: 1.15rem;
      }

      .lightbox-nav.prev {
        left: 18px;
      }

      .lightbox-nav.next {
        right: 18px;
      }

      .lightbox-close:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: translateY(-1px);
      }

      .lightbox-nav:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 28px;
        z-index: 2000;
        max-width: min(90vw, 520px);
        padding: 12px 18px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        background: rgba(238, 248, 244, 0.96);
        color: #0c1211;
        color: #fff;
        box-shadow: var(--shadow-md);
        font-weight: 800;
        transform: translateX(-50%) translateY(90px);
        transition: transform 0.28s ease;
      }

      .toast.show {
        transform: translateX(-50%) translateY(0);
      }

      .toast.success {
        background: var(--accent);
        color: #081210;
      }

      .toast.error {
        background: #b83e2d;
      }

      .footer {
        padding: 18px;
        border-top: 1px solid rgba(220, 239, 235, 0.12);
        background: rgba(12, 18, 17, 0.72);
        color: var(--quiet);
        text-align: center;
        font-size: 0.82rem;
      }

      .hidden {
        display: none;
      }

      .lb-title {
        color: #fff;
        font-size: 1.08rem;
        font-weight: 900;
      }

      .lb-desc {
        margin: 6px 0;
        color: rgba(255, 255, 255, 0.72);
        line-height: 1.55;
      }

      .lb-date {
        color: rgba(255, 255, 255, 0.48);
        font-size: 0.8rem;
      }

      @media (max-width: 760px) {
        .header {
          padding: 10px 14px;
        }

        .header-inner {
          align-items: stretch;
          gap: 12px;
          flex-direction: column;
        }

        .header-actions {
          width: 100%;
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 10px;
        }

        .photo-count {
          width: 100%;
          justify-content: center;
        }

        .main-container {
          padding: 26px 14px 56px;
        }

        .empty-state {
          min-height: auto;
          grid-template-columns: 1fr;
          gap: 24px;
          padding-top: 12px;
        }

        .empty-copy {
          text-align: left;
        }

        .empty-title {
          max-width: 100%;
          font-size: clamp(2.2rem, 12vw, 3.45rem);
          line-height: 1.02;
        }

        .empty-desc {
          margin: 18px 0 22px;
        }

        .memory-stack {
          min-height: 310px;
          order: -1;
        }

        .memory-stack::before {
          inset: 24px 22px;
          border-radius: 22px;
        }

        .memory-frame {
          width: min(68%, 250px);
        }

        .memory-frame.one {
          transform: translate(-18px, -16px) rotate(-5deg);
        }

        .memory-frame.two {
          transform: translate(28px, 20px) rotate(6deg);
        }

        .memory-pin {
          top: 42px;
          left: 57%;
          width: 46px;
          height: 46px;
        }

        .photo-grid {
          grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
          gap: 10px;
        }

        .archive-head {
          align-items: flex-start;
          flex-direction: column;
          margin-top: 0;
        }

        .archive-title {
          max-width: 6em;
          font-size: 2.05rem;
        }

        .archive-desc {
          max-width: 100%;
          font-size: 0.92rem;
        }

        .card-info {
          min-height: 86px;
          padding: 11px;
        }

        .card-desc {
          display: none;
        }

        .lightbox-nav {
          width: 38px;
          height: 38px;
        }
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="header-inner">
        <a href="#" class="brand">
          <div class="brand-icon">忆</div>
          <div class="brand-copy">
            <span class="brand-name">记忆藏馆</span>
            <span class="brand-subtitle">诸神愚戏 · 记忆之神</span>
          </div>
        </a>
        <div class="header-actions">
          <div class="photo-count">
            <strong id="countNum">0</strong><span>枚记忆</span>
          </div>
          <div class="photo-count"><strong>只读</strong><span>藏馆</span></div>
        </div>
      </div>
    </header>

    <main class="main-container">
      <div class="empty-state" id="emptyState">
        <section class="empty-copy">
          <div class="empty-eyebrow">The Archive of Memory</div>
          <h1 class="empty-title">尚无记忆入馆</h1>
          <p class="empty-desc">
            这里是《诸神愚戏》记忆之神的只读藏馆。已收录的片段会安静陈列，供人翻看、辨认与记住。
          </p>
          <div class="empty-actions">
            <span class="empty-note">馆主统一收录，公开上传已关闭。</span>
          </div>
        </section>
        <aside class="memory-stack" aria-hidden="true">
          <div class="memory-frame one"></div>
          <div class="memory-frame two"></div>
          <div class="memory-pin">M</div>
        </aside>
      </div>
      <section class="archive-head hidden" id="archiveHead">
        <div>
          <div class="archive-kicker">Collected Fragments</div>
          <h1 class="archive-title">已封存的记忆切片</h1>
        </div>
        <p class="archive-desc">
          每一枚切片都被封存在记忆之神的藏馆，成为《诸神愚戏》只读档案的一部分。
        </p>
      </section>
      <div class="photo-grid hidden" id="photoGrid"></div>
    </main>

    <div class="lightbox-overlay" id="lightbox">
      <button class="lightbox-close" id="btnLightboxClose" type="button">
        ✕
      </button>
      <button class="lightbox-nav prev" id="btnPrev" type="button">◀</button>
      <button class="lightbox-nav next" id="btnNext" type="button">▶</button>
      <div class="lightbox-content">
        <div class="lightbox-img-wrap">
          <img
            id="lightboxImg"
            src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw=="
            alt=""
          />
        </div>
        <div class="lightbox-info">
          <div class="lb-title" id="lbTitle"></div>
          <div class="lb-desc" id="lbDesc"></div>
          <div class="lb-date" id="lbDate"></div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>
    <footer class="footer">记忆藏馆 · 《诸神愚戏》记忆之神的只读档案</footer>

    <script>
      // ==================== 您的 Supabase 配置 (仅声明一次) ====================
      const SUPABASE_URL = "https://trosjcbvfhnfkelflijc.supabase.co";
      const SUPABASE_ANON_KEY =
        "sb_publishable_sZYKAIzDJJYQgzC2Buzhyw_art6KnAS";

      // 初始化 Supabase 客户端。即使初始化失败，也让页面交互先可用。
      let supabaseClient = null;
      try {
        if (!window.supabase?.createClient) {
          throw new Error("Supabase client script did not load");
        }
        supabaseClient = window.supabase.createClient(
          SUPABASE_URL,
          SUPABASE_ANON_KEY,
        );
      } catch (error) {
        console.error("Supabase 初始化失败:", error);
      }

      const TABLE_NAME = "photos";

      // ==================== 全局状态 ====================
      let allPhotos = [];
      let currentLightboxIndex = -1;

      // DOM 元素
      const $photoGrid = document.getElementById("photoGrid");
      const $emptyState = document.getElementById("emptyState");
      const $archiveHead = document.getElementById("archiveHead");
      const $countNum = document.getElementById("countNum");
      const $lightbox = document.getElementById("lightbox");
      const $lightboxImg = document.getElementById("lightboxImg");
      const $lbTitle = document.getElementById("lbTitle");
      const $lbDesc = document.getElementById("lbDesc");
      const $lbDate = document.getElementById("lbDate");
      const $toast = document.getElementById("toast");

      function toast(msg, type = "") {
        $toast.textContent = msg;
        $toast.className = "toast " + type + " show";
        clearTimeout(toast._timer);
        toast._timer = setTimeout(() => $toast.classList.remove("show"), 3000);
      }

      async function loadPhotos() {
        if (!supabaseClient) {
          toast("记忆藏馆暂时无法连接，请稍后再试", "error");
          renderPhotos();
          return;
        }
        const { data, error } = await supabaseClient
          .from(TABLE_NAME)
          .select("*")
          .order("created_at", { ascending: false });
        if (error) {
          console.error("加载记忆失败:", error);
          toast("加载记忆失败，请检查网络或配置", "error");
          allPhotos = [];
        } else {
          allPhotos = data || [];
        }
        renderPhotos();
      }

      function renderPhotos() {
        $photoGrid.innerHTML = "";
        if (allPhotos.length === 0) {
          $photoGrid.classList.add("hidden");
          $archiveHead.classList.add("hidden");
          $emptyState.style.display = "flex";
        } else {
          $photoGrid.classList.remove("hidden");
          $archiveHead.classList.remove("hidden");
          $emptyState.style.display = "none";
          allPhotos.forEach((photo, idx) => {
            const card = document.createElement("div");
            card.className = "photo-card";
            card.style.animationDelay = `${idx * 0.03}s`;
            const imageMarkup = photo.image_url
              ? `<div class="img-container">
                  <img src="${escapeHTML(photo.image_url)}" alt="${escapeHTML(displayTitle(photo))}" loading="lazy">
                </div>`
              : `<div class="img-container is-empty" aria-label="记忆切片待显影"></div>`;
            card.innerHTML = `
            ${imageMarkup}
            <div class="card-info">
              <div class="card-title">${escapeHTML(displayTitle(photo))}</div>
              <div class="card-desc">${escapeHTML(photo.description || "未写明来处")}</div>
              <div class="card-date">封存 ${formatDate(photo.created_at)}</div>
            </div>
          `;
            const img = card.querySelector("img");
            if (img) {
              img.addEventListener("error", () => {
                const container = img.closest(".img-container");
                img.remove();
                if (container) container.classList.add("is-empty");
              });
            }
            card.addEventListener("click", (e) => {
              openLightbox(idx);
            });
            $photoGrid.appendChild(card);
          });
        }
        $countNum.textContent = allPhotos.length;
      }

      function escapeHTML(str) {
        const div = document.createElement("div");
        div.textContent = str || "";
        return div.innerHTML;
      }

      function formatDate(isoString) {
        if (!isoString) return "";
        const d = new Date(isoString);
        return `${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, "0")}/${String(d.getDate()).padStart(2, "0")} ${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
      }

      function displayTitle(photo) {
        const rawTitle = (photo.title || "").trim();
        if (!rawTitle || /^(image|img)[_-]?\d+/i.test(rawTitle)) {
          return "未命名记忆";
        }
        return rawTitle;
      }

      function openLightbox(index) {
        if (index < 0 || index >= allPhotos.length) return;
        currentLightboxIndex = index;
        const p = allPhotos[index];
        $lightboxImg.src = p.image_url;
        $lbTitle.textContent = displayTitle(p);
        $lbDesc.textContent = p.description || "";
        $lbDate.textContent = "封存于 " + formatDate(p.created_at);
        $lightbox.classList.add("active");
        document.body.style.overflow = "hidden";
      }

      function closeLightbox() {
        $lightbox.classList.remove("active");
        document.body.style.overflow = "";
      }

      function navLightbox(dir) {
        if (allPhotos.length === 0) return;
        let idx = currentLightboxIndex + dir;
        if (idx < 0) idx = allPhotos.length - 1;
        if (idx >= allPhotos.length) idx = 0;
        openLightbox(idx);
      }

      // 事件绑定
      document
        .getElementById("btnLightboxClose")
        .addEventListener("click", closeLightbox);
      $lightbox.addEventListener("click", (e) => {
        if (e.target === $lightbox) closeLightbox();
      });
      document
        .getElementById("btnPrev")
        .addEventListener("click", () => navLightbox(-1));
      document
        .getElementById("btnNext")
        .addEventListener("click", () => navLightbox(1));
      document.addEventListener("keydown", (e) => {
        if ($lightbox.classList.contains("active")) {
          if (e.key === "Escape") closeLightbox();
          if (e.key === "ArrowLeft") navLightbox(-1);
          if (e.key === "ArrowRight") navLightbox(1);
        }
      });

      // 启动加载
      loadPhotos();
    </script>
  </body>
</html>
